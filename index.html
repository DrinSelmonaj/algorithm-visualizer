<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizualizues Algoritmesh</title>

    <link rel="stylesheet" href="vendor/highlight-dark.css">
    <link rel="stylesheet" href="styles/main.css?v=2">
    <link rel="stylesheet" href="styles/visualizer.css?v=2">
    <link rel="stylesheet" href="styles/controls.css?v=2">
    <link rel="stylesheet" href="styles/code-panel.css?v=2">
</head>
<body>
    <!-- ── Skeleton Loading — mbulon gjithë faqen derisa fontet+layout të stabilizohen ── -->
    <div id="page-skeleton">
        <div class="skel-header">
            <div class="skel shimmer" style="width:160px; height:24px;"></div>
            <div class="skel shimmer" style="width:280px; height:14px; margin-left:16px;"></div>
        </div>
        <div class="skel-body">
            <aside class="skel-sidebar">
                <div class="skel shimmer" style="width:70%; height:12px; margin-bottom:14px;"></div>
                <div class="skel shimmer" style="width:100%; height:34px; margin-bottom:8px;"></div>
                <div class="skel shimmer" style="width:100%; height:34px; margin-bottom:8px;"></div>
                <div class="skel shimmer" style="width:100%; height:34px; margin-bottom:20px;"></div>
                <div class="skel shimmer" style="width:60%; height:12px; margin-bottom:14px;"></div>
                <div class="skel shimmer" style="width:100%; height:34px; margin-bottom:8px;"></div>
                <div class="skel shimmer" style="width:100%; height:34px; margin-bottom:8px;"></div>
                <div class="skel shimmer" style="width:100%; height:34px; margin-bottom:8px;"></div>
                <div class="skel shimmer" style="width:100%; height:34px;"></div>
            </aside>
            <main class="skel-main">
                <div class="skel shimmer" style="width:220px; height:22px; margin-bottom:20px;"></div>
                <div class="skel shimmer" style="flex:1; width:100%;"></div>
                <div class="skel shimmer" style="width:340px; height:56px; margin:16px auto;"></div>
            </main>
            <aside class="skel-code">
                <div class="skel shimmer" style="width:80px; height:16px; margin-bottom:18px;"></div>
                <div class="skel shimmer" style="width:90%; height:12px; margin-bottom:10px;"></div>
                <div class="skel shimmer" style="width:75%; height:12px; margin-bottom:10px;"></div>
                <div class="skel shimmer" style="width:85%; height:12px; margin-bottom:10px;"></div>
                <div class="skel shimmer" style="width:60%; height:12px; margin-bottom:10px;"></div>
                <div class="skel shimmer" style="width:80%; height:12px;"></div>
            </aside>
        </div>
    </div>

    <div style="display:none" id="icon-sprite-holder"></div>
  
    <!-- HEADER -->
    <header class="app-header">
        <h1 class="app-title">AlgoPro IDE</h1>
        <p class="app-subtitle">Shiko algoritmet duke u ekzekutuar — hap pas hapi</p>
    </header>

    <!-- LAYOUT: [sidebar] [visualizer] [code-panel] -->
    <main class="app-layout">

        <!-- ZONA 1 — Lista e algoritmeve -->
        <aside class="sidebar">

            <details class="algo-group">
                <summary class="algo-group-title">
                    <span>Kërkim</span>
                    <span class="chevron">▾</span>
                </summary>
                <div class="algo-group-items">
                    <button class="algo-btn" data-algorithm="linear" data-category="searching">
                        <svg class="icon"><use href="#icon-search"></use></svg>
                        <span>Linear Search</span>
                    </button>
                    <button class="algo-btn" data-algorithm="binary" data-category="searching">
                        <svg class="icon"><use href="#icon-search_check"></use></svg>
                        <span>Binary Search</span>
                    </button>
                </div>
            </details>

            <details class="algo-group" open>
                <summary class="algo-group-title">
                    <span>Renditje</span>
                    <span class="chevron">▾</span>
                </summary>
                <div class="algo-group-items">
                    <button class="algo-btn" data-algorithm="bubble" data-category="sorting">
                        <svg class="icon"><use href="#icon-sort"></use></svg>
                        <span>Bubble Sort</span>
                    </button>
                    <button class="algo-btn" data-algorithm="insertion" data-category="sorting">
                        <svg class="icon"><use href="#icon-layers"></use></svg>
                        <span>Insertion Sort</span>
                    </button>
                    <button class="algo-btn" data-algorithm="selection" data-category="sorting">
                        <svg class="icon"><use href="#icon-grid_view"></use></svg>
                        <span>Selection Sort</span>
                    </button>
                    <button class="algo-btn" data-algorithm="merge" data-category="sorting">
                        <svg class="icon"><use href="#icon-call_split"></use></svg>
                        <span>Merge Sort</span>
                    </button>
                    <button class="algo-btn" data-algorithm="quick" data-category="sorting">
                        <svg class="icon"><use href="#icon-bolt"></use></svg>
                        <span>Quick Sort</span>
                    </button>
                    <button class="algo-btn" data-algorithm="shell" data-category="sorting">
                        <svg class="icon"><use href="#icon-reorder"></use></svg>
                        <span>Shell Sort</span>
                    </button>
                    <button class="algo-btn" data-algorithm="heap" data-category="sorting">
                        <svg class="icon"><use href="#icon-account_tree"></use></svg>
                        <span>Heap Sort</span>
                    </button>
                    <button class="algo-btn" data-algorithm="radix" data-category="sorting">
                        <svg class="icon"><use href="#icon-grid_on"></use></svg>
                        <span>Radix Sort</span>
                    </button>
                </div>
            </details>

            <details class="algo-group">
                <summary class="algo-group-title">
                    <span>BST</span>
                    <span class="chevron">▾</span>
                </summary>
                <div class="algo-group-items">
                    <button class="algo-btn" data-algorithm="bst" data-category="bst">
                        <svg class="icon"><use href="#icon-lan"></use></svg>
                        <span>BST Operations</span>
                    </button>
                </div>
            </details>

            <details class="algo-group">
                <summary class="algo-group-title">
                    <span>Grafe</span>
                    <span class="chevron">▾</span>
                </summary>
                <div class="algo-group-items">
                    <button class="algo-btn" data-algorithm="dijkstra" data-category="graph">
                        <svg class="icon"><use href="#icon-route"></use></svg>
                        <span>Dijkstra</span>
                    </button>
                    <button class="algo-btn" data-algorithm="kruskal" data-category="graph">
                        <svg class="icon"><use href="#icon-hub"></use></svg>
                        <span>Kruskal</span>
                    </button>
                </div>
            </details>

            <details class="algo-group">
                <summary class="algo-group-title">
                    <span>Struktura të Dhënash</span>
                    <span class="chevron">▾</span>
                </summary>
                <div class="algo-group-items">
                    <button class="algo-btn" data-algorithm="stack" data-category="datastructures">
                        <svg class="icon"><use href="#icon-vertical_align_top"></use></svg>
                        <span>Stack</span>
                    </button>
                    <button class="algo-btn" data-algorithm="queue" data-category="datastructures">
                        <svg class="icon"><use href="#icon-queue"></use></svg>
                        <span>Queue</span>
                    </button>
                    <button class="algo-btn" data-algorithm="linkedlist" data-category="datastructures">
                        <svg class="icon"><use href="#icon-view_stream"></use></svg>
                        <span>Linked List</span>
                    </button>
                    <button class="algo-btn" data-algorithm="hashmap" data-category="datastructures">
                        <svg class="icon"><use href="#icon-database"></use></svg>
                        <span>HashMap</span>
                    </button>
                </div>
            </details>

        </aside>

        <!-- ZONA 2 — Vizualizuesi kryesor -->
        <section class="visualizer-zone">

            <div class="algo-info-bar">
                <h2 id="active-algo-name">Zgjidh një algoritëm</h2>
                <div class="algo-info-bar-right">
                    <div class="complexity-badges">
                        <span class="badge" id="badge-time">Time: —</span>
                        <span class="badge" id="badge-space">Space: —</span>
                    </div>
                    <!-- Custom Input — shfaqet vetëm për Sorting/Searching -->
                    <div class="custom-input-group">
                        <input type="text" id="custom-array-input"
                               aria-label="Vlerat e tua"
                               placeholder="p.sh. 15, 42, 8" class="ds-input" style="width:150px;">
                        <button id="btn-custom-apply" class="btn btn-primary">Përdor</button>
                        <button id="btn-custom-clear" class="btn btn-secondary">✕ Random</button>
                        <span id="custom-input-feedback" class="custom-input-feedback"></span>
                    </div>
                </div>
            </div>

          <!-- SVG — mbushet dinamikisht nga renderer-at -->
            <div class="svg-container">
                <svg id="main-svg" width="100%" height="400">
                    <text x="50%" y="50%" text-anchor="middle" class="svg-placeholder">
                        Zgjidh një algoritëm nga lista
                    </text>
                </svg>
                <aside id="dijkstra-distance-panel" class="distance-panel glass-panel" hidden
                       aria-label="Distancat aktuale të Dijkstra-s" aria-live="polite">
                    <h3>Distancat aktuale</h3>
                    <div id="dijkstra-distance-rows"></div>
                </aside>
            </div>

            <!-- Statusi/mesazhi live i hapit aktual — i përbashkët për Graf + Struktura
                 të dhënash (animator.js e mbush me step.message nga gjeneratori) -->
            <div id="algo-status" class="algo-status glass-panel"></div>

            <!-- Statistikat live — kartelë glassmorphism, poshtë SVG-së -->
            <div class="stats-bar glass-panel">
                <div class="stat">
                    <span class="stat-label">Krahasime</span>
                    <span class="stat-value" id="stat-comparisons">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label" id="stat-swaps-label">Ndërrime</span>
                    <span class="stat-value" id="stat-swaps">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Hapi</span>
                    <span class="stat-value" id="stat-step">0</span>
                </div>
            </div>

            <!-- Kontrolluesit -->
            <div class="controls-bar">

               <div class="control-buttons">
                    <button id="btn-run" class="btn-circle btn-circle-primary glow-primary" disabled title="Ekzekuto" aria-label="Ekzekuto">
                        <svg class="icon"><use href="#icon-play_arrow"></use></svg>
                    </button>
                    <button id="btn-pause" class="btn-circle" disabled title="Pauzë" aria-label="Pauzë">
                        <svg class="icon"><use href="#icon-pause"></use></svg>
                    </button>
                    <button id="btn-reset" class="btn-circle" disabled title="Rikthe" aria-label="Rikthe">
                        <svg class="icon"><use href="#icon-replay"></use></svg>
                    </button>
                    <button id="btn-step" class="btn-circle" disabled title="Hap" aria-label="Hap pas hapi">
                        <svg class="icon"><use href="#icon-skip_next"></use></svg>
                    </button>
                </div>

                <div class="speed-control">
                    <label for="speed-slider">Shpejtësia</label>
                    <div class="speed-labels">
                        <span>Ngadalë</span>
                        <input type="range" id="speed-slider" min="1" max="3" value="2" step="1">
                        <span>Shpejt</span>
                    </div>
                </div>

                <div class="size-control">
                    <label for="size-slider">Elementet: <span id="size-value">20</span></label>
                    <input type="range" id="size-slider" min="5" max="45" value="20">
                </div>

                <!-- BST Input — shfaqet vetëm kur BST është aktiv -->
                <div id="bst-input-group" class="bst-input-group">
                    <div class="bst-control-row">
                        <input type="text" id="bst-values-input"
                               placeholder="p.sh. 5,3,7,1,4" class="ds-input bst-values-input">
                        <button id="btn-bst-run" class="btn btn-primary">Krijo pemën</button>
                    </div>
                    <div class="bst-control-row">
                        <input type="number" step="1" id="bst-operation-input"
                               placeholder="Vlera" title="Vlera për futje, fshirje ose kërkim" class="ds-input ds-input--small">
                        <button id="btn-bst-insert" class="btn btn-primary">Fut</button>
                        <button id="btn-bst-delete" class="btn btn-secondary">Fshi</button>
                        <button id="btn-bst-search" class="btn btn-secondary">Kërko</button>
                    </div>
                    <div class="bst-control-row bst-traversal-row" aria-label="Mënyrat e traversal-it">
                        <button id="btn-bst-inorder" class="btn btn-secondary">In-order</button>
                        <button id="btn-bst-preorder" class="btn btn-secondary">Pre-order</button>
                        <button id="btn-bst-postorder" class="btn btn-secondary">Post-order</button>
                    </div>
                </div>

                <!-- DS Panel — Stack / Queue / LinkedList / HashMap -->
                <div id="ds-controls" style="display:none;"></div>

            </div>
        </section>

        <!-- ZONA 3 — Paneli i kodit Java -->
        <aside class="code-panel">
            <div class="code-panel-header">
                <h3>Kodi Java</h3>
                <div class="code-panel-header-right">
                    <button id="btn-copy-code" class="icon-btn" title="Kopjo kodin" aria-label="Kopjo kodin">
                        <svg class="icon"><use href="#icon-content_copy"></use></svg>
                    </button>
                    <span class="code-lang-badge">Java</span>
                </div>
            </div>
            <pre><code id="java-code-display" class="language-java">// Zgjidh një algoritëm për të parë kodin</code></pre>
        </aside>

    </main>

    <script>
fetch('assets/icons-sprite.svg')
  .then(r => r.text())
  .then(svg => document.getElementById('icon-sprite-holder').innerHTML = svg);
</script>

<!-- Librarite -->
    <script src="vendor/d3.v7.min.js"></script>
    <script src="vendor/highlight.min.js"></script>

    <!-- Entry point -->
    <script type="module" src="main.js"></script>
    <!-- Heq skeleton-in kur fontet + layout të jenë gati (jo më herët) -->
    <script>
        Promise.all([
            document.fonts.ready,
            new Promise(resolve => {
                if (document.readyState === 'complete') resolve();
                else window.addEventListener('load', resolve);
            })
        ]).then(() => {
            // Pak buffer shtesë (200ms) — siguron që edhe reflow i fundit i mundshëm të përfundojë 
            setTimeout(() => {
                const skel = document.getElementById('page-skeleton');
                if (!skel) return;
                skel.style.opacity = '0';
                setTimeout(() => skel.remove(), 400);
            }, 200);
        });
    </script>
</body>
</html>
